<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pictogram Practice</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .hidden { display: none !important; }
    .menu-card, .finish-card {
      background: #fffdfa;
      border: 2px solid #dccfc1;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(65, 44, 31, 0.08);
      padding: 28px;
      max-width: 760px;
      margin: 24px auto;
    }
    .menu-title {
      margin: 0 0 12px;
      font-size: 30px;
      color: #7b3524;
    }
    .menu-text {
      margin: 0 0 20px;
      font-size: 20px;
      line-height: 1.7;
    }
    .mode-group {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
      margin: 18px 0 26px;
      font-size: 22px;
    }
    .mode-group label {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .mode-group input[type="radio"] {
      transform: scale(1.3);
    }
    .status-line {
      margin-top: 12px;
      text-align: center;
      font-size: 18px;
      color: #7a4a33;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="header">
      <div class="header-inner">
        <p class="eyebrow">English Grammar Practice</p>
        <h1>Pictogram Practice</h1>
        <p class="sub">絵 → 日本語 → ヒント → 英文確認 の流れで学習します。</p>
      </div>
    </header>

    <main class="main">
      <section id="menuScreen" class="menu-card">
        <h2 class="menu-title">Menu</h2>
        <p class="menu-text">表示モードを選んでから Start を押してください。</p>
        <div class="mode-group">
          <label><input type="radio" name="mode" value="sequential" checked> 順番通り</label>
          <label><input type="radio" name="mode" value="random"> ランダム</label>
        </div>
        <div class="buttons">
          <button class="btn btn-primary" onclick="startPractice()">Start</button>
        </div>
      </section>

      <section id="practiceScreen" class="card hidden">
        <div class="image-wrap">
          <img id="img" alt="pictogram">
        </div>

        <div class="text-block">
          <p class="label">Japanese</p>
          <p id="jp" class="jp"></p>
        </div>

        <div class="text-block hint-block">
          <p class="label">Hint / Answer</p>
          <p id="hint" class="hint"></p>
        </div>

        <p id="status" class="status-line"></p>

        <div class="buttons">
          <button class="btn btn-secondary" onclick="showHint()">Hint</button>
          <button class="btn btn-accent" onclick="showAnswer()">Answer</button>
          <button class="btn btn-primary" onclick="nextItem()">Next</button>
          <button class="btn btn-secondary" onclick="returnToMenu()">メニューに戻る</button>
        </div>
      </section>

      <section id="finishScreen" class="finish-card hidden">
        <h2 class="menu-title">Finished</h2>
        <p class="menu-text">1周完了しました。</p>
        <div class="buttons">
          <button class="btn btn-primary" onclick="returnToMenu()">メニューに戻る</button>
        </div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
